<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <!-- Fondo con esquinas redondeadas, color azul GNOME -->
  <rect width="128" height="128" rx="22" fill="#1c71d8"/>

  <!-- Plano en forma de L (paredes exteriores) -->
  <polyline
    points="20,20 108,20 108,68 70,68 70,108 20,108 20,20"
    stroke="white" stroke-width="6"
    stroke-linecap="round" stroke-linejoin="round"
    fill="none"/>

  <!-- Pared interior horizontal -->
  <line x1="20" y1="58" x2="64" y2="58"
        stroke="white" stroke-width="6"
        stroke-linecap="round"/>

  <!-- Pared interior vertical -->
  <line x1="60" y1="20" x2="60" y2="58"
        stroke="white" stroke-width="6"
        stroke-linecap="round"/>

  <!-- Cota de medida (parte inferior) -->
  <line x1="20" y1="118" x2="108" y2="118"
        stroke="white" stroke-width="2.5"
        stroke-linecap="round" opacity="0.7"/>
  <line x1="20" y1="113" x2="20" y2="123"
        stroke="white" stroke-width="2.5"
        stroke-linecap="round" opacity="0.7"/>
  <line x1="108" y1="113" x2="108" y2="123"
        stroke="white" stroke-width="2.5"
        stroke-linecap="round" opacity="0.7"/>
</svg>
