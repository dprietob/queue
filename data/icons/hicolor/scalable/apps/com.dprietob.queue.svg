<?xml version="1.0" encoding="UTF-8"?>
<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <clipPath id="board">
      <rect x="0" y="0" width="512" height="512" rx="60" ry="60"/>
    </clipPath>
    <linearGradient id="ring-gradient" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#1e293b"/>
      <stop offset="0.5" stop-color="#475569"/>
      <stop offset="1" stop-color="#1e293b"/>
    </linearGradient>
    <filter id="ring-shadow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="4" stdDeviation="2" flood-color="#000000" flood-opacity="0.3"/>
    </filter>
  </defs>

  <g clip-path="url(#board)">
    <!-- Background -->
    <rect x="0" y="0" width="512" height="512" fill="#ffffff"/>

    <!-- Left color strip (corners rounded by the board clip) -->
    <rect x="0" y="0"   width="80" height="128" fill="#fcd34d"/>
    <rect x="0" y="128" width="80" height="128" fill="#f43f5e"/>
    <rect x="0" y="256" width="80" height="128" fill="#8b5cf6"/>
    <rect x="0" y="384" width="80" height="128" fill="#22c55e"/>
    <rect x="0" y="482" width="80" height="30"  fill="#86efac"/>

    <!-- Content card borders (interior stays white) -->
    <rect x="80"  y="0"   width="428" height="2"   fill="#d1d5db"/>
    <rect x="506" y="0"   width="2"   height="512" fill="#d1d5db"/>
    <rect x="80"  y="482" width="428" height="30"  fill="#d1d5db"/>

    <!-- Task row 1: completed -->
    <rect x="144" y="63" width="96" height="96" rx="24" fill="#2b7fff" fill-opacity="0.5"/>
    <rect x="144" y="58" width="96" height="96" rx="24" fill="#3b82f6"/>
    <rect x="160" y="106" width="32" height="16" rx="8" fill="#ffffff" transform="rotate(45 176 114)"/>
    <rect x="170" y="98"  width="56" height="16" rx="8" fill="#ffffff" transform="rotate(-45 198 106)"/>
    <rect x="268" y="80"  width="176" height="16" rx="8" fill="#6b7280"/>
    <rect x="268" y="116" width="128" height="16" rx="8" fill="#9ca3af"/>

    <!-- Task row 2: completed -->
    <rect x="144" y="199" width="96" height="96" rx="24" fill="#2b7fff" fill-opacity="0.5"/>
    <rect x="144" y="194" width="96" height="96" rx="24" fill="#3b82f6"/>
    <rect x="160" y="242" width="32" height="16" rx="8" fill="#ffffff" transform="rotate(45 176 250)"/>
    <rect x="170" y="234" width="56" height="16" rx="8" fill="#ffffff" transform="rotate(-45 198 242)"/>
    <rect x="268" y="216" width="176" height="16" rx="8" fill="#6b7280"/>
    <rect x="268" y="252" width="128" height="16" rx="8" fill="#9ca3af"/>

    <!-- Task row 3: pending -->
    <rect x="148" y="334" width="88" height="88" rx="20" fill="none" stroke="#6b7280" stroke-width="8"/>
    <rect x="268" y="352" width="176" height="16" rx="8" fill="#6b7280"/>
    <rect x="268" y="388" width="128" height="16" rx="8" fill="#9ca3af"/>

    <!-- Spiral binding rings -->
    <g>
      <circle cx="64"  cy="82" r="16" fill="#0f172a"/>
      <circle cx="102" cy="82" r="18" fill="#0f172a"/>
      <rect x="48" y="64" width="64" height="28" rx="14" fill="url(#ring-gradient)" filter="url(#ring-shadow)"/>
    </g>
    <g>
      <circle cx="64"  cy="198" r="16" fill="#0f172a"/>
      <circle cx="102" cy="198" r="18" fill="#0f172a"/>
      <rect x="48" y="180" width="64" height="28" rx="14" fill="url(#ring-gradient)" filter="url(#ring-shadow)"/>
    </g>
    <g>
      <circle cx="64"  cy="314" r="16" fill="#0f172a"/>
      <circle cx="102" cy="314" r="18" fill="#0f172a"/>
      <rect x="48" y="296" width="64" height="28" rx="14" fill="url(#ring-gradient)" filter="url(#ring-shadow)"/>
    </g>
    <g>
      <circle cx="64"  cy="430" r="16" fill="#0f172a"/>
      <circle cx="102" cy="430" r="18" fill="#0f172a"/>
      <rect x="48" y="412" width="64" height="28" rx="14" fill="url(#ring-gradient)" filter="url(#ring-shadow)"/>
    </g>
  </g>
</svg>
