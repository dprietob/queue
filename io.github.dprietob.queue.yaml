app-id: io.github.dprietob.queue
runtime: org.gnome.Platform
runtime-version: '50'
sdk: org.gnome.Sdk
command: queue

finish-args:
  - --share=ipc
  - --socket=wayland
  - --socket=fallback-x11
  - --device=dri

cleanup:
  - /include
  - /lib/pkgconfig
  - '*.a'
  - '*.la'

modules:
  - name: queue
    buildsystem: meson
    sources:
      - type: dir
        path: .
